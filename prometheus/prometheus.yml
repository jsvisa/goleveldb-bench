global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  - job_name: pebble-bench
    scrape_interval: 5s
    static_configs:
      - targets:
          - 127.0.0.1:2112

  - job_name: nodeexporter
    scrape_interval: 15s
    static_configs:
      - targets:
          - 127.0.0.1:9100
